{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 style="margin-bottom: 20px;">➕ Adicionar Refeição</h2>
    
    <form method="POST" id="mealForm">
        <input type="hidden" name="date" value="{{ selected_date }}">
        <input type="hidden" name="items" id="itemsInput" value="[]">
        <input type="hidden" name="meal_type" id="mealTypeInput" value="breakfast">
        
        <div class="form-group">
            <label>Tipo de Refeição</label>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button type="button" class="category-btn active" onclick="setMealType('breakfast', this)">🌅 Café da Manhã</button>
                <button type="button" class="category-btn" onclick="setMealType('lunch', this)">☀️ Almoço</button>
                <button type="button" class="category-btn" onclick="setMealType('dinner', this)">🌙 Jantar</button>
                <button type="button" class="category-btn" onclick="setMealType('snack', this)">🍪 Lanche</button>
            </div>
        </div>
        
        <div class="form-group">
            <label>Buscar Alimentos</label>
            <input type="text" id="searchInput" placeholder="Digite para buscar..." oninput="filterFoods()">
        </div>
        
        <div class="category-filter" id="categoryFilter">
            <button type="button" class="category-btn active" onclick="filterCategory('all', this)">Todos</button>
            <button type="button" class="category-btn" onclick="filterCategory('proteins', this)">Proteínas</button>
            <button type="button" class="category-btn" onclick="filterCategory('carbs', this)">Carboidratos</button>
            <button type="button" class="category-btn" onclick="filterCategory('vegetables', this)">Vegetais</button>
            <button type="button" class="category-btn" onclick="filterCategory('fruits', this)">Frutas</button>
            <button type="button" class="category-btn" onclick="filterCategory('fats', this)">Gorduras</button>
            <button type="button" class="category-btn" onclick="filterCategory('beverages', this)">Bebidas</button>
        </div>
        
        <div class="food-grid" id="foodGrid">
            {% for food in food_database %}
            <div class="food-card" data-food-id="{{ food.id }}" data-category="{{ food.category }}" data-name="{{ food.name.lower() }}" onclick="toggleFood({{ food.id }}, this)">
                <div class="food-emoji">{{ food.emoji or '🍽️' }}</div>
                <div class="food-name">{{ food.name }}</div>
                <div class="food-info">{{ food.calories }} kcal/100g</div>
            </div>
            {% endfor %}
        </div>
        
        <div class="card" id="selectedFoodsCard" style="display: none; margin-top: 20px;">
            <h3>Alimentos Selecionados</h3>
            <div id="selectedFoodsList"></div>
            <div style="margin-top: 15px;">
                <strong>Total: <span id="totalCalories">0</span> kcal</strong>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
            Salvar Refeição
        </button>
    </form>
</div>

<script>
    let selectedFoods = {};
    let currentCategory = 'all';
    let currentMealType = 'breakfast';
    
    const foodDatabase = {{ food_database|tojson }};
    
    function setMealType(type, btn) {
        currentMealType = type;
        document.getElementById('mealTypeInput').value = type;
        document.querySelectorAll('#mealForm .category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    
    function filterCategory(category, btn) {
        currentCategory = category;
        document.querySelectorAll('#categoryFilter .category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterFoods();
    }
    
    function filterFoods() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.food-card');
        
        cards.forEach(card => {
            const category = card.dataset.category;
            const name = card.dataset.name;
            
            const matchesCategory = currentCategory === 'all' || category === currentCategory;
            const matchesSearch = name.includes(searchTerm);
            
            card.style.display = matchesCategory && matchesSearch ? 'block' : 'none';
        });
    }
    
    function toggleFood(foodId, card) {
        if (selectedFoods[foodId]) {
            delete selectedFoods[foodId];
            card.classList.remove('selected');
        } else {
            const food = foodDatabase.find(f => f.id === foodId);
            selectedFoods[foodId] = {
                food_id: food.id,
                food_name: food.name,
                grams: food.serving_size,
                calories: food.calories * (food.serving_size / 100),
                protein: food.protein * (food.serving_size / 100),
                carbs: food.carbs * (food.serving_size / 100),
                fat: food.fat * (food.serving_size / 100)
            };
            card.classList.add('selected');
        }
        
        updateSelectedFoods();
    }
    
    function updateSelectedFoods() {
        const card = document.getElementById('selectedFoodsCard');
        const list = document.getElementById('selectedFoodsList');
        const totalEl = document.getElementById('totalCalories');
        
        const foods = Object.values(selectedFoods);
        
        if (foods.length === 0) {
            card.style.display = 'none';
            document.getElementById('itemsInput').value = '[]';
            return;
        }
        
        card.style.display = 'block';
        list.innerHTML = foods.map(food => `
            <div class="meal-item">
                <div>
                    <strong>${food.food_name}</strong>
                    <input type="number" value="${food.grams}" 
                           onchange="updateGrams(${food.food_id}, this.value)"
                           style="width: 70px; margin-left: 10px;"> g
                </div>
                <div>${food.calories.toFixed(0)} kcal</div>
            </div>
        `).join('');
        
        const total = foods.reduce((sum, f) => sum + f.calories, 0);
        totalEl.textContent = total.toFixed(0);
        
        document.getElementById('itemsInput').value = JSON.stringify(foods);
    }
    
    function updateGrams(foodId, grams) {
        const food = foodDatabase.find(f => f.id === foodId);
        const multiplier = grams / 100;
        
        selectedFoods[foodId].grams = parseFloat(grams);
        selectedFoods[foodId].calories = food.calories * multiplier;
        selectedFoods[foodId].protein = food.protein * multiplier;
        selectedFoods[foodId].carbs = food.carbs * multiplier;
        selectedFoods[foodId].fat = food.fat * multiplier;
        
        updateSelectedFoods();
    }
</script>
{% endblock %}
