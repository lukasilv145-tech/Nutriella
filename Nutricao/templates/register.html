{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 50px auto;">
    <h2 style="text-align: center; margin-bottom: 30px; color: #667eea;">👤 Cadastro</h2>
    <p style="text-align: center; margin-bottom: 30px; color: #666;">Vamos conhecer você!</p>
    
    <form method="POST">
        <div class="form-group">
            <label>Nome</label>
            <input type="text" name="name" required placeholder="Seu nome">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Idade</label>
                <input type="number" name="age" required min="10" max="100" placeholder="Anos">
            </div>
            <div class="form-group">
                <label>Peso (kg)</label>
                <input type="number" name="weight" required min="30" max="300" step="0.1" placeholder="kg">
            </div>
        </div>
        
        <div class="form-group">
            <label>Altura (cm)</label>
            <input type="number" name="height" required min="100" max="250" placeholder="cm">
        </div>
        
        <div class="form-group">
            <label>Gênero</label>
            <select name="gender" required>
                <option value="male">Masculino</option>
                <option value="female">Feminino</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Objetivo</label>
            <select name="goal" required>
                <option value="lose_weight">Perder peso</option>
                <option value="maintain">Manter peso</option>
                <option value="gain_muscle">Ganhar músculos</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Nível de Atividade Física</label>
            <select name="activity_level" required>
                <option value="1.2">Sedentário (pouco ou nenhum exercício)</option>
                <option value="1.375">Levemente ativo (exercício leve 1-3 dias/semana)</option>
                <option value="1.55">Moderadamente ativo (exercício moderado 3-5 dias/semana)</option>
                <option value="1.725">Muito ativo (exercício intenso 6-7 dias/semana)</option>
                <option value="1.9">Extremamente ativo (exercício muito intenso)</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
            Começar 🚀
        </button>
    </form>
</div>
{% endblock %}
